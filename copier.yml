# ====== Copier 配置 ======
# 多语言项目模板（Python / Go / TypeScript）
_subdirectory: template
_templates_suffix: ""
_min_copier_version: "9.0.0"

_exclude:
  - "*.pyc"
  - "__pycache__"
  - "*.pyo"
  - "*.pyd"
  - ".Python"
  - "*.so"
  - "*.egg"
  - "*.egg-info"
  - "dist"
  - "build"
  - ".DS_Store"
  - ".svn"
  - ".hg"
  - ".git"
  - ".tox"
  - ".coverage"
  - ".cache"
  - ".nosetests"
  - ".mypy_cache"
  - ".pytest_cache"
  - ".ruff_cache"
  - "node_modules"
  - "copier.yml"

_skip_if_exists:
  - .env
  - .secrets.yaml

# ====== 语言选择 ======
language:
  type: str
  default: python
  help: 选择主要编程语言
  choices:
    "Python (uv + ruff + FastAPI)": python
    "Go (go mod + Gin + Cobra)": golang
    "TypeScript (npm + Biome + Hono)": typescript

# ====== 项目信息 ======
project_name:
  type: str
  default: "My Project"
  help: 项目名称（可包含空格）

project_slug:
  type: str
  default: "{{ project_name|lower|replace(' ', '-')|replace('_', '-') }}"
  help: 项目 slug（用于目录名和模块名）

package_name:
  type: str
  default: "{{ project_slug.replace('-', '_') }}"
  help: 包名（Python 模块名 / Go import path 前缀 / npm 包名）"

# ====== 作者信息 ======
author_name:
  type: str
  default: "Your Name"
  help: 作者名称

author_email:
  type: str
  default: "your.email@example.com"
  help: 作者邮箱

# ====== 项目描述 ======
description:
  type: str
  default: "A short description of your project"
  help: 项目描述

# ====== 版本配置 ======
version:
  type: str
  default: "0.1.0"
  help: 初始版本号

# ====== 语言特定版本 ======
python_version:
  type: str
  default: "3.13"
  help: Python 版本要求
  choices:
    - "3.11"
    - "3.12"
    - "3.13"
  when: "{{ language == 'python' }}"

go_version:
  type: str
  default: "1.24"
  help: Go 版本要求
  when: "{{ language == 'golang' }}"

node_version:
  type: str
  default: "22"
  help: Node.js 版本要求
  when: "{{ language == 'typescript' }}"

# ====== 许可证 ======
license:
  type: str
  default: "MIT"
  help: 开源协议
  choices:
    - MIT
    - BSD-3-Clause
    - ISC
    - Apache-2.0
    - GPL-3.0
    - Not open source

# ====== 仓库配置 ======
repository_provider:
  type: str
  default: "https://github.com"
  help: 仓库提供商 URL

repository_username:
  type: str
  default: "{{ author_name|lower|replace(' ', '-') }}"
  help: 仓库用户名

# ====== 功能选项 ======
add_api:
  type: bool
  default: true
  help: "{% if language == 'python' %}是否添加 FastAPI 示例{% elif language == 'golang' %}是否添加 Gin API 示例{% else %}是否添加 Hono API 示例{% endif %}"

add_cli:
  type: bool
  default: false
  help: "{% if language == 'golang' %}是否添加 Cobra CLI 示例{% elif language == 'typescript' %}是否添加 Commander CLI 示例{% else %}是否添加 CLI 示例{% endif %}"

# ====== 代码规范 ======
line_length:
  type: int
  default: 88
  help: 代码行长度限制

# ====== 版权信息 ======
copyright_date:
  type: str
  default: "{{ now().year }}"
  help: 版权年份

# ====== 生成后消息 ======
_message_after_copy: |
  {{ "\n" }}============================================================
  项目 "{{ project_name }}" 创建成功！[{{ language }}]
  ============================================================

  下一步：

  1. 进入项目目录：
     $ cd {{ _copier_conf.dst_path }}

  2. 安装依赖：
     $ make install

  {% if language == 'python' -%}
  3. 安装 pre-commit 钩子：
     $ .venv/bin/pre-commit install
  {% elif language == 'golang' -%}
  3. 下载依赖：
     $ make install
  {% elif language == 'typescript' -%}
  3. 安装依赖：
     $ npm install
  {% endif -%}

  4. 运行代码检查：
     $ make check

  5. 运行测试：
     $ make test

  {% if add_api -%}
  {% if language == 'python' -%}
  6. 启动 API 服务器（可选）：
     $ .venv/bin/python -m {{ package_name }}.api
  {% elif language == 'golang' -%}
  6. 启动 API 服务器（可选）：
     $ go run ./cmd/{{ project_slug }}
  {% elif language == 'typescript' -%}
  6. 启动开发服务器（可选）：
     $ npm run dev
  {% endif -%}
  {% endif -%}

  ============================================================
