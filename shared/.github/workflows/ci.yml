name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
{{#if language == 'python'}}
  test:
    name: Python 测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
          python-version: "{{ python_version }}"

      - name: 安装依赖
        run: uv sync

      - name: 运行 ruff 检查
        run: uv run ruff check .

      - name: 运行 ruff 格式检查
        run: uv run ruff format --check .

      - name: 运行 mypy 类型检查
        run: uv run mypy src/{{ package_name }}

      - name: 运行测试
        run: uv run pytest --cov=src/{{ package_name }} --cov-report=xml --cov-report=term-missing

{{#elif language == 'golang'}}
  test:
    name: Go 测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: "{{ go_version }}"

      - name: 下载依赖
        run: go mod download

      - name: 运行 golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: 运行 go vet
        run: go vet ./...

      - name: 运行测试
        run: go test ./... -race -coverprofile=coverage.out -count=1

      - name: 上传覆盖率
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.out
          fail_ci_if_error: false

{{#elif language == 'typescript'}}
  test:
    name: TypeScript 测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "{{ node_version }}"
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 运行 Biome 检查
        run: npx biome check .

      - name: 运行类型检查
        run: npx tsc --noEmit

      - name: 运行测试
        run: npx vitest run --coverage

{{#endif}}
