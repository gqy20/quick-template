name: 测试 Copier 模板

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-template:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Python
          - language: python
            with-api: true
            with-cli: false
          - language: python
            with-api: false
            with-cli: true
          # Go
          - language: golang
            with-api: true
            with-cli: false
          - language: golang
            with-api: false
            with-cli: true
          # TypeScript
          - language: typescript
            with-api: true
            with-cli: false
          - language: typescript
            with-api: false
            with-cli: false

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装工具
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          python -m pip install copier

      - name: 使用 copier 生成项目（{{ matrix.language }}）
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          copier copy --vcs-ref HEAD . /tmp/test-{{ matrix.language }} \
            --data language={{ matrix.language }} \
            --data project_name="Test Project" \
            --data package_name="test_package" \
            --data author_name="Test Author" \
            --data author_email="test@example.com" \
            --data description="A test project" \
            --data version="0.1.0" \
            --data license="MIT" \
            --data add_api=${{ matrix.with-api }} \
            --data add_cli=${{ matrix.with-cli }} \
            --data line_length=88 \
            --defaults

      - name: 验证生成的项目结构
        run: |
          echo "=== 项目结构 ==="
          find /tmp/test-{{ matrix.language }} -type f | head -30
          echo "=== 验证关键文件 ==="

{% if matrix.language == 'python' -%}
          test -f /tmp/test-{{ matrix.language }}/pyproject.toml && echo "pyproject.toml OK" || echo "pyproject.toml MISSING"
          test -d /tmp/test-{{ matrix.language }}/src && echo "src/ OK" || echo "src/ MISSING"
          test -d /tmp/test-{{ matrix.language }}/tests && echo "tests/ OK" || echo "tests/ MISSING"

{%- elif matrix.language == 'golang' -%}
          test -f /tmp/test-{{ matrix.language }}/go.mod && echo "go.mod OK" || echo "go.mod MISSING"
          test -d /tmp/test-{{ matrix.language }}/cmd && echo "cmd/ OK" || echo "cmd/ MISSING"
          test -d /tmp/test-{{ matrix.language }}/internal && echo "internal/ OK" || echo "internal/ MISSING"

{%- elif matrix.language == 'typescript' -%}
          test -f /tmp/test-{{ matrix.language }}/package.json && "package.json OK" || echo "package.json MISSING"
          test -f /tmp/test-{{ matrix.language }}/tsconfig.json && "tsconfig.json OK" || echo "tsconfig.json MISSING"
          test -d /tmp/test-{{ matrix.language }}/src && "src/ OK" || echo "src/ MISSING"
{%- endif %}

          test -f /tmp/test-{{ matrix.language }}/Makefile && "Makefile OK" || echo "Makefile MISSING"
          test -f /tmp/test-{{ matrix.language }}/README.md && "README.md OK" || echo "README.md MISSING"

{% if matrix.language == 'python' -%}
      - name: Python：安装依赖并检查
        working-directory: /tmp/test-{{ matrix.language }}
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          uv venv
          uv pip install -e ".[dev]"
          uv run ruff check .
          uv run ruff format --check .

      - name: Python：运行测试
        working-directory: /tmp/test-{{ matrix.language }}
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          uv run pytest --cov=src/test_package --cov-report=term-missing -v

{%- elif matrix.language == 'golang' -%}
      - name: Go：验证模块
        working-directory: /tmp/test-{{ matrix.language }}
        run: |
          go mod download
          go vet ./...
          go build ./...

{%- elif matrix.language == 'typescript' -%}
      - name: TypeScript：安装依赖并检查
        working-directory: /tmp/test-{{ matrix.language }}
        run: |
          npm install
          npx biome check .
          npx tsc --noEmit

      - name: TypeScript：运行测试
        working-directory: /tmp/test-{{ matrix.language }}
        run: |
          npx vitest run
{%- endif %}
