name: 测试 Copier 模板

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-template:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            with-api: true
            with-cli: false
          - language: python
            with-api: false
            with-cli: true
          - language: golang
            with-api: true
            with-cli: false
          - language: typescript
            with-api: true
            with-cli: false

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装工具
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 使用 copier 生成项目（Python API）
        id: generate
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          OUTPUT=$(uv run --with copier test_template.py \
            "${{ matrix.language }}" "${{ matrix.with-api }}" "${{ matrix.with_cli }}")
          echo "$OUTPUT"
          DST_DIR=$(echo "$OUTPUT" | grep "^OK:" | cut -d: -f2-)
          echo "dst_dir=$DST_DIR" >> $GITHUB_OUTPUT

      - name: 验证生成的项目结构
        run: |
          echo "=== 项目结构 ==="
          find ${{ steps.generate.outputs.dst_dir }} -type f | head -30
          echo ""
          echo "=== 验证关键文件 ==="

      - name: 验证 Python 关键文件
        if: matrix.language == 'python'
        run: |
          D=${{ steps.generate.outputs.dst_dir }}
          test -f $D/pyproject.toml && echo "pyproject.toml OK" || (echo "pyproject.toml MISSING" && exit 1)
          test -d $D/src && echo "src/ OK" || (echo "src/ MISSING" && exit 1)
          test -d $D/tests && echo "tests/ OK" || (echo "tests/ MISSING" && exit 1)

      - name: 验证 Go 关键文件
        if: matrix.language == 'golang'
        run: |
          D=${{ steps.generate.outputs.dst_dir }}
          test -f $D/go.mod && echo "go.mod OK" || (echo "go.mod MISSING" && exit 1)
          test -d $D/cmd && echo "cmd/ OK" || (echo "cmd/ MISSING" && exit 1)
          test -d $D/internal && echo "internal/ OK" || (echo "internal/MISSING" && exit 1)

      - name: 验证 TypeScript 关键文件
        if: matrix.language == 'typescript'
        run: |
          D=${{ steps.generate.outputs.dst_dir }}
          test -f $D/package.json && echo "package.json OK" || (echo "package.json MISSING" && exit 1)
          test -f $D/tsconfig.json && echo "tsconfig.json OK" || (echo "tsconfig.json MISSING" && exit 1)
          test -d $D/src && echo "src/ OK" || (echo "src/ MISSING" && exit 1)

      - name: 验证公共文件
        run: |
          D=${{ steps.generate.outputs.dst_dir }}
          test -f $D/Makefile && echo "Makefile OK" || (echo "Makefile MISSING" && exit 1)
          test -f $D/README.md && echo "README.md OK" || (echo "README.md MISSING" && exit 1)

      # ========== Python 完整检查 ==========
      - name: Python — 安装依赖
        if: matrix.language == 'python'
        working-directory: ${{ steps.generate.outputs.dst_dir }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv venv
          uv pip install -e ".[dev]"

      - name: Python — ruff 检查
        if: matrix.language == 'python'
        working-directory: ${{ steps.generate.outputs.dst_dir }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run ruff check .
          uv run ruff format --check .

      - name: Python — mypy 类型检查
        if: matrix.language == 'python'
        working-directory: ${{ steps.generate.outputs.dst_dir }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          PKG=$(ls src/ | head -1)
          uv run mypy "src/$PKG"

      - name: Python — 运行测试
        if: matrix.language == 'python'
        working-directory: ${{ steps.generate.outputs.dst_dir }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run pytest --cov=src/test_package --cov-report=term-missing -v

      # ========== Go 完整检查 ==========
      - name: Go — 验证模块
        if: matrix.language == 'golang'
        working-directory: ${{ steps.generate.outputs.dst_dir }}
        run: |
          go mod download
          go mod tidy
          go vet ./...
          go build ./...

      # ========== TypeScript 完整检查 ==========
      - name: TypeScript — 安装依赖
        if: matrix.language == 'typescript'
        working-directory: ${{ steps.generate.outputs.dst_dir }}
        run: npm install

      - name: TypeScript — Biome 检查
        if: matrix.language == 'typescript'
        working-directory: ${{ steps.generate.outputs.dst_dir }}
        run: npx biome check .

      - name: TypeScript — 类型检查
        if: matrix.language == 'typescript'
        working-directory: ${{ steps.generate.outputs.dst_dir }}
        run: npx tsc --noEmit

      - name: TypeScript — 运行测试
        if: matrix.language == 'typescript'
        working-directory: ${{ steps.generate.outputs.dst_dir }}
        run: npx vitest run
